; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = portenta_h7_m7_mid_mcp2515_j4_dual_csm

[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
framework = arduino
build_src_filter =
  +<*>
  -<usb_min.cpp>
  -<can_spi_diag.cpp>
  -<mcp_int_diag.cpp>
  -<int_pin_usb_diag.cpp>
  -<spi_loopback_diag.cpp>
  -<cs_drive_diag.cpp>
  -<pin_step_diag.cpp>
  -<mcp_bb_diag.cpp>
  -<mcp_pin_truth_diag.cpp>
  -<mcp_slow_active_diag.cpp>
  -<mcp_spi_variants_diag.cpp>
  -<mcp_loopback_diag.cpp>
lib_deps =
  https://github.com/autowp/arduino-mcp2515.git#737f0d536770dc7182bc18e0168f38a810f710a8

[env:portenta_h7_m7_builtin_can_tx_test]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=1

[env:portenta_h7_m7_mcp_polling_recovery]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_mcp_int_main]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_mcp_int_tx_test]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=1
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0
  -D BOARD_ENABLE_MCP2515_TX_TEST=1
  -D BOARD_MCP2515_TX_PERIOD_MS=500

[env:portenta_h7_m7_mid_mcp2515_csm]
extends = env:portenta_h7_m7
