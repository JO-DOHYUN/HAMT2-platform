; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
framework = arduino
build_src_filter =
  +<*>
  -<usb_min.cpp>
  -<can_spi_diag.cpp>
  -<mcp_int_diag.cpp>
  -<int_pin_usb_diag.cpp>
  -<spi_loopback_diag.cpp>
  -<cs_drive_diag.cpp>
lib_deps =
  https://github.com/autowp/arduino-mcp2515.git#737f0d536770dc7182bc18e0168f38a810f710a8

[env:portenta_h7_m7_builtin_can_tx_test]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=1

[env:portenta_h7_m7_mcp_polling_recovery]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_mcp_int_main]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=1
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_dual_can_basic]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=1
  -D BOARD_ENABLE_BUILTIN_CAN_RX=1
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=1
  -D BOARD_ENABLE_HOST_CAN_TX=1
  -D BOARD_BUILTIN_CAN_TX_PERIOD_MS=500
  -D BOARD_ENABLE_VOLTAGE_ADC=1
  -D BOARD_VOLTAGE_SAMPLE_PERIOD_MS=20

[env:portenta_h7_m7_mid_dual_can20]
platform = ststm32
board = portenta_h7_m7
framework = arduino
build_src_filter =
  +<*>
  -<usb_min.cpp>
  -<can_spi_diag.cpp>
  -<mcp_int_diag.cpp>
  -<int_pin_usb_diag.cpp>
  -<spi_loopback_diag.cpp>
  -<cs_drive_diag.cpp>
build_flags =
  -D BOARD_HW_PROFILE_MID_TJA1051_DUAL=1
  -D BOARD_TARGET_INTERNAL_CAN_LANE0=1
  -D BOARD_TARGET_INTERNAL_CAN_LANE1=1
  -D BOARD_ENABLE_MCP2515=0
  -D BOARD_ENABLE_MCP2515_INIT=0
  -D BOARD_CAN_IRQ_MODE=0
  -D BOARD_ENABLE_BUILTIN_CAN_RX=1
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0
  -D BOARD_ENABLE_HOST_CAN_TX=1
  -D BOARD_ENABLE_VOLTAGE_ADC=1
  -D BOARD_VOLTAGE_SAMPLE_PERIOD_MS=20

[env:portenta_h7_m7_mcp_exti_hint_main]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_CAN_IRQ_MODE=2
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_usb_diag]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_ENABLE_MCP2515=0
  -D BOARD_ENABLE_TIM3_ENCODER=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_stream_diag]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_ENABLE_MCP2515=0
  -D BOARD_ENABLE_TIM3_ENCODER=0
  -D BOARD_ENABLE_SAFETY_IO=0
  -D BOARD_ENABLE_ENCODER_IO=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_safety_diag]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_ENABLE_MCP2515=0
  -D BOARD_ENABLE_TIM3_ENCODER=0
  -D BOARD_ENABLE_ENCODER_IO=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_mcp_diag]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_ENABLE_TIM3_ENCODER=0
  -D BOARD_ENABLE_SAFETY_IO=0
  -D BOARD_ENABLE_ENCODER_IO=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_mcp_noinit_diag]
extends = env:portenta_h7_m7
build_flags =
  -D BOARD_ENABLE_MCP2515_INIT=0
  -D BOARD_ENABLE_TIM3_ENCODER=0
  -D BOARD_ENABLE_SAFETY_IO=0
  -D BOARD_ENABLE_ENCODER_IO=0
  -D BOARD_ENABLE_BUILTIN_CAN_TX_TEST=0

[env:portenta_h7_m7_min_usb]
platform = ststm32
board = portenta_h7_m7
framework = arduino
build_src_filter =
  -<*>
  +<usb_min.cpp>

[env:portenta_h7_m7_can_spi_diag]
